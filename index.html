<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000000">
<link rel="icon" type="image/png" href="./icon-192.png">

<title>SISTEMA UNICO PREMIUM</title>

<script type="module" src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs"></script>

<style>
body{
  font-family:impact;
  background-image:url("./bg.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-attachment:fixed;
  color:blue;
  text-align:center;
  padding:20px;
}

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

h1{
  color:white;
  letter-spacing:3px;
  text-shadow:
    0 0 6px #ffffff,
    0 0 12px #1e90ff,
    0 0 20px #1e90ff;
  animation:pulsoTitulo 3s ease-in-out infinite;
}

@keyframes pulsoTitulo{
  0%{
    text-shadow:
      0 0 6px #ffffff,
      0 0 12px #1e90ff,
      0 0 20px #1e90ff;
  }
  50%{
    text-shadow:
      0 0 10px #ffffff,
      0 0 20px #1e90ff,
      0 0 35px #1e90ff;
  }
  100%{
    text-shadow:
      0 0 6px #ffffff,
      0 0 12px #1e90ff,
      0 0 20px #1e90ff;
  }
}

@keyframes pulsoAcierto{
  0%{
    text-shadow:
      0 0 6px rgba(255,255,255,0.6),
      0 0 10px rgba(0,229,255,0.4);
    transform:scale(1);
  }
  50%{
    text-shadow:
      0 0 12px rgba(255,255,255,1),
      0 0 22px rgba(0,229,255,0.9);
    transform:scale(1.05);
  }
  100%{
    text-shadow:
      0 0 6px rgba(255,255,255,0.6),
      0 0 10px rgba(0,229,255,0.4);
    transform:scale(1);
  }
}

.hidden{
  display:none;
}

.inputs{
  display:grid;
  gap:10px;
  justify-content:center;
}

.inputs input{
  width:70px;
  height:70px;
  font-size:34px;
  font-weight:bold;
  background:#000000;
  border:3px solid #000000;
  color:#ffffff;
  text-align:center;
}

.ingreso{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:15px;
  justify-content:center;
  align-items:start;
  width:fit-content;
  margin:0 auto;
}

.ingresoCol{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.ingresoInput{
  width:80px;
  height:80px;
  font-size:36px;
  font-weight:bold;

  background-image:url("./bg-casino-green.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  border:none;
  border-radius:8px;

  color:#00ff88;
  text-align:center;

  text-shadow:0 0 6px #00ff88;

  outline:none;
}

.label{
  margin-top:0;
  font-weight:bold;
}
  .repBox{
  width:340px;
  min-height:65px;

  margin:10px auto;

  border:6px solid #444;

  font-weight:bold;

  padding:10px;

  color:#fff;

  font-size:44px;
}

.favoritosBox{
  background:#172742;
  border-color:#00e5ff;
}

.onfireBox{
  background:#3b150e;
  border-color:#ff5500;
}

.totalBox{
  width:130px;
  height:80px;

  font-size:30px;
  font-weight:bold;

  background-image:url("./btn-neon-cian.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  border:none;

  color:#ffffff;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:10px;

  text-shadow:0 2px 6px rgba(0,0,0,0.8);
}

.totalLabel{
  margin-top:0;
  font-weight:bold;
  color:#00e5ff;
  text-shadow:0 0 6px #00e5ff;
}

.fichaBox{
  width:85px;
  height:85px;

  font-size:38px;
  font-weight:bold;

  background-image:url("./ficha-verde.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  border:none;

  color:#000;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:8px;

  text-shadow:0 1px 3px rgba(0,0,0,0.5);
}

.fichaLabel{
  margin-top:0;
  font-weight:bold;
  color:#00ff88;
  text-shadow:0 0 6px #00ff88;
}

.gananciaBox{
  width:130px;
  height:80px;

  font-size:30px;
  font-weight:bold;

  background-image:url("./btn-neon-gold.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  border:none;

  color:#ffffff;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:10px;

  text-shadow:0 2px 6px rgba(0,0,0,0.85);
}

.gananciaLabel{
  margin-top:0;
  font-weight:bold;
  color:#ffd700;
  text-shadow:0 0 6px #ffd700;
}

.aciertoWrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  margin-top:6px;
}

.aciertoBox{
  width:90px;
  height:90px;

  font-size:48px;
  font-weight:bold;

  background-image:url("./bg-acierto-blue.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  border:none;

  color:#ffffff;

  display:none;
  align-items:center;
  justify-content:center;

  border-radius:10px;

  text-shadow:0 0 8px #00e5ff;

  animation:pulsoAcierto 4s ease-in-out infinite;
}

.aciertoLabel{
  margin-top:0;
  font-weight:bold;
  color:#00e5ff;
  text-shadow:0 0 6px #00e5ff;
  display:none;
  }
  .valorWrap{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:10px;
  margin-top:12px;
  flex-wrap:wrap;
}

.valorCol{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.valorInput{
  width:95px;
  height:58px;

  font-size:26px;
  font-weight:bold;

  background:#050505;
  color:#00ff88;

  border:3px solid #00ff88;
  border-radius:10px;

  text-align:center;
  outline:none;

  text-shadow:0 0 6px #00ff88;
  box-shadow:
    0 0 8px rgba(0,255,136,0.55),
    inset 0 0 8px rgba(0,255,136,0.25);
}

.valorInput:disabled{
  opacity:0.85;
  color:#ffffff;
  border-color:#ffd700;
  text-shadow:0 0 6px #ffd700;
}

.valorLabel{
  margin-top:0;
  font-weight:bold;
  color:#00ff88;
  text-shadow:0 0 6px #00ff88;
}

.valorBtn{
  height:58px;
  padding:0 14px;
  background:#0b3b24;
  color:#ffffff;
  font-weight:bold;
  border:2px solid #00ff88;
  border-radius:10px;
  text-shadow:0 0 6px #00ff88;
}

button{
  padding:10px;
  background:maroon;
  color:white;
  font-weight:bold;
  border:none;
  border-radius:8px;
}

.loginBox{
  display:inline-block;
  padding:14px 16px;
  border:2px solid #444;
  border-radius:10px;
}

.loginRow{
  margin:8px 0;
}

.loginInput{
  width:220px;
  height:36px;
  font-size:18px;
  padding:6px 10px;
  border:2px solid #444;
  background:#111;
  color:#fff;
  border-radius:8px;
}

.logoutBtn{
  margin-top:14px;
  padding:8px 14px;
  background:#222;
  color:#fff;
  border:2px solid #444;
  border-radius:10px;
  font-weight:bold;
}

#splash{
  position:fixed;
  inset:0;
  z-index:99999;

  background:#000;

  background-image:url("./splash.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

#appContent{
  display:none;
}

#winFx{
  width:100%;
  display:none;
  justify-content:center;
  align-items:center;
  margin-top:6px;
  margin-bottom:2px;
}

#winPlayer{
  width:300px;
  height:300px;
}
</style>
</head>

<body>

<div id="splash"></div>

<div id="appContent">

<h1>SISTEMA UNICO PREMIUM</h1>
