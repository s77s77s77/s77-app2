<head>

<link rel="manifest" href="./manifest.json">

<title>SISTEMA UNICO PREMIUM</title>

<script type="module" src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs"></script>

<style>
body{
  font-family:impact;
  background-image:url("./bg.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-attachment:fixed;
  color:blue;
  text-align:center;
  padding:20px;
}

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

h1{
  color:white;
  letter-spacing:3px;
  text-shadow:
    0 0 6px #ffffff,
    0 0 12px #1e90ff,
    0 0 20px #1e90ff;
  animation:pulsoTitulo 3s ease-in-out infinite;
}

@keyframes pulsoTitulo{
  0%{
    text-shadow:
      0 0 6px #ffffff,
      0 0 12px #1e90ff,
      0 0 20px #1e90ff;
  }
  50%{
    text-shadow:
      0 0 10px #ffffff,
      0 0 20px #1e90ff,
      0 0 35px #1e90ff;
  }
  100%{
    text-shadow:
      0 0 6px #ffffff,
      0 0 12px #1e90ff,
      0 0 20px #1e90ff;
  }
}

@keyframes pulsoAcierto{
  0%{
    text-shadow:
      0 0 6px rgba(255,255,255,0.6),
      0 0 10px rgba(0,229,255,0.4);
    transform:scale(1);
  }
  50%{
    text-shadow:
      0 0 12px rgba(255,255,255,1),
      0 0 22px rgba(0,229,255,0.9);
    transform:scale(1.05);
  }
  100%{
    text-shadow:
      0 0 6px rgba(255,255,255,0.6),
      0 0 10px rgba(0,229,255,0.4);
    transform:scale(1);
  }
}

.hidden{
  display:none;
}

.inputs{
  display:grid;
  gap:10px;
  justify-content:center;
}

.inputs input{
  width:70px;
  height:70px;
  font-size:34px;
  font-weight:bold;
  background:#000000;
  border:3px solid #000000;

  text-align:center;
}

.ingreso{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:15px;
  justify-content:center;
  align-items:start;
  width:fit-content;

}

.ingresoCol{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.ingresoInput{
  width:80px;
  height:80px;
  font-size:36px;
  font-weight:bold;

  background-image:url("./bg-casino-green.png");

  background-position:center;

  border:none;
  border-radius:8px;

  color:#00ff88;
  text-align:center;

  text-shadow:0 0 6px #00ff88;

}

.label{
  margin-top:0;
  font-weight:bold;
}
  .repBox{
  width:340px;
  min-height:65px;

  margin:10px auto;

  border:6px solid #444;

  font-weight:bold;

  padding:10px;

  color:#fff;

  font-size:44px;
}

.favoritosBox{
  background:#172742;
  border-color:#00e5ff;
}

.onfireBox{
  background:#3b150e;
  border-color:#ff5500;
}

.totalBox{
  width:130px;
  height:80px;

  font-size:30px;
  font-weight:bold;

  background-image:url("./btn-neon-cian.png");
  background-size:cover;

  display:flex;

  justify-content:center;

  border-radius:10px;

  text-shadow:0 2px 6px rgba(0,0,0,0.8);
}

.totalLabel{
  margin-top:0;
  font-weight:bold;
  color:#00e5ff;
  text-shadow:0 0 6px #00e5ff;
}

.fichaBox{
  width:85px;
  height:85px;

  font-size:38px;
  font-weight:bold;

  background-image:url("./ficha-verde.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  border:none;

  color:#000;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:8px;

  text-shadow:0 1px 3px rgba(0,0,0,0.5);
}

.fichaLabel{
  margin-top:0;
  font-weight:bold;
  color:#00ff88;
  text-shadow:0 0 6px #00ff88;
}

.gananciaBox{
  width:130px;
  height:80px;

  font-size:30px;
  font-weight:bold;

  background-image:url("./btn-neon-gold.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  border:none;

  color:#ffffff;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:10px;

  text-shadow:0 2px 6px rgba(0,0,0,0.85);
}

.gananciaLabel{
  margin-top:0;
  font-weight:bold;
  color:#ffd700;
  text-shadow:0 0 6px #ffd700;
}

.aciertoWrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  margin-top:6px;
}

.aciertoBox{
  width:90px;
  height:90px;

  font-size:48px;
  font-weight:bold;

  background-image:url("./bg-acierto-blue.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  border:none;

  color:#ffffff;

  display:none;
  align-items:center;
  justify-content:center;

  border-radius:10px;

  text-shadow:0 0 8px #00e5ff;

  animation:pulsoAcierto 4s ease-in-out infinite;
}

.aciertoLabel{
  margin-top:0;
  font-weight:bold;
  color:#00e5ff;
  text-shadow:0 0 6px #00e5ff;
  display:none;
  }
  .valorWrap{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:10px;
  margin-top:12px;
  flex-wrap:wrap;
}

.valorCol{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.valorInput{
  width:95px;
  height:58px;

  font-size:26px;
  font-weight:bold;

  background:#050505;
  color:#00ff88;

  border:3px solid #00ff88;
  border-radius:10px;

  text-align:center;
  outline:none;

  text-shadow:0 0 6px #00ff88;
  box-shadow:
    0 0 8px rgba(0,255,136,0.55),
    inset 0 0 8px rgba(0,255,136,0.25);
}

.valorInput:disabled{
  opacity:0.85;
  color:#ffffff;
  border-color:#ffd700;
  text-shadow:0 0 6px #ffd700;
}

.valorLabel{
  margin-top:0;
  font-weight:bold;
  color:#00ff88;
  text-shadow:0 0 6px #00ff88;
}

.valorBtn{
  height:58px;
  padding:0 14px;
  background:#0b3b24;
  color:#ffffff;
  font-weight:bold;
  border:2px solid #00ff88;
  border-radius:10px;
  text-shadow:0 0 6px #00ff88;
}

button{
  padding:10px;
  background:maroon;
  color:white;
  font-weight:bold;
  border:none;
  border-radius:8px;
}

.loginBox{
  display:inline-block;
  padding:14px 16px;
  border:2px solid #444;
  border-radius:10px;
}

.loginRow{
  margin:8px 0;
}

.loginInput{
  width:220px;
  height:36px;
  font-size:18px;
  padding:6px 10px;
  border:2px solid #444;
  background:#111;
  color:#fff;
  border-radius:8px;
}

.logoutBtn{
  margin-top:14px;
  padding:8px 14px;
  background:#222;
  color:#fff;
  border:2px solid #444;
  border-radius:10px;
  font-weight:bold;
}

#splash{
  position:fixed;
  inset:0;
  z-index:99999;

  background:#000;

  background-image:url("./splash.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

#appContent{
  display:none;
}

#winFx{
  width:100%;
  display:none;
  justify-content:center;
  align-items:center;
  margin-top:6px;
  margin-bottom:2px;
}

#winPlayer{
  width:300px;
  height:300px;
}
</style>
</head>

<body>

<div id="splash"></div>

<div id="appContent">

<h1>SISTEMA UNICO PREMIUM</h1>
<div id="login" class="loginBox">

  <div class="loginRow">
    <input id="usuario" class="loginInput" placeholder="Usuario">
  </div>

  <div class="loginRow">
    <input id="clave" class="loginInput" placeholder="Clave" type="password">
  </div>

  <div class="loginRow">
    <button onclick="ingresar()">INGRESAR</button>
  </div>

  <p id="err" style="color:red;margin:6px 0 0;"></p>

</div>

<div id="sistema" class="hidden">

  <div class="inputs" id="casilleros"></div>

  <br>

  <div class="ingreso">

    <div class="ingresoCol">

      <input id="nuevo" class="ingresoInput">

      <div class="label" style="color:#00ff88;">
        INGRESO
      </div>

    </div>

  </div>

  <br>

<!-- =========================
     FAVORITOS / REP3
========================= -->

<div class="repBox favoritosBox" id="favoritosBox">
  —
</div>

<div class="label" style="color:#00e5ff;font-size:26px;">
  FAVORITOS
</div>

<br>

<!-- =========================
     ON FIRE / REP4+
========================= -->

<div class="repBox onfireBox" id="onfireBox">
  —
</div>

<div class="label" style="color:#ff5500;font-size:26px;">
  ON FIRE
</div>

<br>
<br>

<div class="ingreso">

  <div class="ingresoCol">

    <div id="totalGeneral" class="totalBox">
      0
    </div>

    <div class="totalLabel">
      TOTAL
    </div>

  </div>

  <div class="ingresoCol">

    <div id="fichaGeneral" class="fichaBox">
      1
    </div>

    <div class="fichaLabel">
      FICHA
    </div>

  </div>

  <div class="ingresoCol">

    <div id="gananciaGeneral" class="gananciaBox">
      0
    </div>

    <div class="gananciaLabel">
      GANANCIA
    </div>

    <div class="aciertoWrap">

      <div id="aciertoBox" class="aciertoBox">
        0
      </div>

      <div id="aciertoLabel" class="aciertoLabel">
        ACIERTO
      </div>

    </div>

  </div>

  </div>
  <!-- =========================
     VALOR DE FICHA + REINICIAR
========================= -->

<div class="resetValorWrap">

  <div class="valorCol">

    <input
      id="valorFichaInput"
      class="valorInput"
      type="number"
      min="1"
      step="1"
      placeholder="100"
    >

    <div id="valorLabel" class="valorLabel">
      VALOR
    </div>

    <button id="valorOkBtn" class="valorOkBtn" onclick="guardarValorFicha()">
      OK
    </button>

  </div>

  <div class="reiniciarCol">

    <button onclick="resetear()">
      REINICIAR
    </button>

  </div>

</div>

<div id="winFx">

  <dotlottie-player
    id="winPlayer"
    src="./success-cav.lottie"
    background="transparent"
    speed="1"
    loop="false"
    autoplay="false">
  </dotlottie-player>

</div>

<button class="logoutBtn" onclick="salir()">
  SALIR
</button>

</div>

</div>

<script>

const API = "https://s77-backend2.onrender.com";

const TOKEN_KEY = "S77_TOKEN_V1";
const ROLE_KEY  = "S77_ROLE_V1";

let TOKEN = localStorage.getItem(TOKEN_KEY) || "";
let ROLE  = localStorage.getItem(ROLE_KEY) || "";

let booted = false;
let winFxTimer = null;

function fetchWithTimeout(url, options = {}, timeoutMs = 12000){

  const controller = new AbortController();

  const id = setTimeout(
    () => controller.abort(),
    timeoutMs
  );

  return fetch(url, {
    ...options,
    signal: controller.signal
  }).finally(() => clearTimeout(id));
}
  /* =========================
   VALOR DE FICHA
========================= */

let valorFichaActual = 1;
let valorFichaBloqueado = false;

function aplicarValorFichaUI(data){

  const input = document.getElementById("valorFichaInput");
  const label = document.getElementById("valorLabel");
  const btn = document.getElementById("valorOkBtn");

  const valor = Number(data?.valorFicha);

  valorFichaActual = Number.isFinite(valor) && valor > 0
    ? valor
    : 1;

  valorFichaBloqueado = !!data?.valorFichaBloqueado;

  if(input){
    input.value = String(valorFichaActual);
    input.disabled = valorFichaBloqueado;
  }

  if(label){
    label.style.display = valorFichaBloqueado ? "none" : "block";
  }

  if(btn){
    btn.style.display = valorFichaBloqueado ? "none" : "inline-block";
  }
}

async function guardarValorFicha(){

  if(!TOKEN){
    alert("Tenés que estar logueado.");
    return;
  }

  const input = document.getElementById("valorFichaInput");

  const valor = Number(input?.value);

  if(!Number.isFinite(valor) || valor <= 0){
    alert("Ingresá un valor de ficha válido.");
    return;
  }

  if(!Number.isInteger(valor)){
    alert("El valor de ficha debe ser un número entero.");
    return;
  }

  try{

    const r = await fetchWithTimeout(`${API}/api/set-valor-ficha`,{

      method:"POST",

      headers:{
        "Content-Type":"application/json",
        "Authorization": `Bearer ${TOKEN}`
      },

      body: JSON.stringify({
        valorFicha: valor
      })

    }, 12000);

    const data = await r.json();

    if(!r.ok){
      alert("No se pudo guardar el valor.");
      return;
    }

    aplicarValorFichaUI(data);

  }catch(e){

    alert("No conecta con el backend.");
  }
}

/* =========================
   EFECTO ACIERTO
========================= */

function showWinFx(ms = 1200){

  const fx = document.getElementById("winFx");
  const player = document.getElementById("winPlayer");

  if(!fx || !player) return;

  fx.style.display = "flex";

  try{
    player.stop();
    player.play();
  }catch(e){}

  clearTimeout(winFxTimer);

  winFxTimer = setTimeout(() => {
    fx.style.display = "none";
  }, ms);
  }
  /* =========================
   GANANCIA LOCAL
========================= */

const GANANCIA_KEY = "S77_GANANCIA_GENERAL_V1";

let gananciaAcum = Number(
  localStorage.getItem(GANANCIA_KEY) || 0
);

if(!Number.isFinite(gananciaAcum)){
  gananciaAcum = 0;
}

function setGanancia(v){

  gananciaAcum = Number(v) || 0;

  gananciaGeneral.textContent = Math.round(gananciaAcum);

  localStorage.setItem(
    GANANCIA_KEY,
    String(gananciaAcum)
  );
}

setGanancia(gananciaAcum);

function sumarGanancia(value){

  const n = Number(value);

  if(!Number.isFinite(n)) return;

  setGanancia(gananciaAcum + n);
}

function renderAcierto(show, value){

  if(show){

    aciertoBox.style.display = "flex";
    aciertoLabel.style.display = "block";
    aciertoBox.textContent = String(
      Math.round(Number(value) || 0)
    );

  }else{

    aciertoBox.style.display = "none";
    aciertoLabel.style.display = "none";
    aciertoBox.textContent = "0";
  }
}

function setTotal(v){

  const n = Number(v);

  totalGeneral.textContent = Number.isFinite(n)
    ? String(Math.round(n))
    : "0";
}

function setFicha(data){

  const mult = Number(data?.fichasTotal ?? data?.activeMult ?? 1);
  const valor = Number(data?.valorFicha ?? valorFichaActual ?? 1);
  const monto = Number(data?.montoFicha ?? data?.fichaFinal);

  let final = 1;

  if(Number.isFinite(monto) && monto > 0){
    final = monto;
  }else{
    final = (Number.isFinite(mult) && mult > 0 ? mult : 1) *
            (Number.isFinite(valor) && valor > 0 ? valor : 1);
  }

  fichaGeneral.textContent = String(Math.round(final));
}

function renderLista(id, arr){

  const el = document.getElementById(id);

  if(!el) return;

  const clean = Array.isArray(arr)
    ? [...arr].sort((a,b)=>Number(a)-Number(b))
    : [];

  el.textContent = clean.length
    ? clean.join(" ")
    : "—";
  }
  const NUM_BG = {
  0:"#0b7a3b",
  1:"#ff0000", 2:"#000000", 3:"#ff0000", 4:"#000000", 5:"#ff0000",
  6:"#000000", 7:"#ff0000", 8:"#000000", 9:"#ff0000", 10:"#000000",
  11:"#000000", 12:"#ff0000", 13:"#000000", 14:"#ff0000", 15:"#000000",
  16:"#ff0000", 17:"#000000", 18:"#ff0000", 19:"#ff0000", 20:"#000000",
  21:"#ff0000", 22:"#000000", 23:"#ff0000", 24:"#000000", 25:"#ff0000",
  26:"#000000", 27:"#ff0000", 28:"#000000", 29:"#000000", 30:"#ff0000",
  31:"#000000", 32:"#ff0000", 33:"#000000", 34:"#ff0000", 35:"#000000",
  36:"#ff0000"
};

function pintarCasilleroPorNumero(inputEl){

  const v = parseInt(inputEl.value, 10);

  inputEl.style.background = Number.isFinite(v)
    ? (NUM_BG[v] || "#000")
    : "#000";

  inputEl.style.color = "#fff";
  inputEl.style.borderColor = "#000";
}

function validarNumero(n){

  if(!Number.isInteger(n)){
    return {
      ok:false,
      msg:"Tenés que ingresar un número entero."
    };
  }

  if(n < 0 || n > 36){
    return {
      ok:false,
      msg:"Solo se permiten números del 0 al 36."
    };
  }

  return {
    ok:true,
    msg:""
  };
}

async function ingresar(){

  const u = (usuario.value || "").trim();
  const p = (clave.value || "").trim();

  if(!u || !p){
    err.innerText = "Completa usuario y clave";
    return;
  }

  try{

    const r = await fetchWithTimeout(`${API}/auth/login`,{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body: JSON.stringify({
        user:u,
        pass:p
      })

    }, 12000);

    const data = await r.json();

    if(!r.ok){
      err.innerText = "Usuario/clave inválidos o vencidos";
      return;
    }

    TOKEN = data.token;
    ROLE = data.role;

    localStorage.setItem(TOKEN_KEY, TOKEN);
    localStorage.setItem(ROLE_KEY, ROLE);

    err.innerText = "";

    mostrarSistema();

    await cargarEstado();

  }catch(e){

    err.innerText = "No conecta con el servidor. ¿Está prendido el backend?";
  }
  }
  function mostrarLogin(){

  login.classList.remove("hidden");
  login.style.display = "inline-block";

  sistema.classList.add("hidden");
  sistema.style.display = "none";
}

function mostrarSistema(){

  login.classList.add("hidden");
  login.style.display = "none";

  sistema.classList.remove("hidden");
  sistema.style.display = "block";
}

function salir(){

  if(!confirm("¿Seguro querés salir?")) return;

  TOKEN = "";
  ROLE = "";

  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(ROLE_KEY);

  mostrarLogin();
}

function renderInicial(){

  casilleros.innerHTML = "";

  casilleros.style.gridTemplateColumns =
    "repeat(4,70px)";

  for(let i=0;i<16;i++){

    const c = document.createElement("input");

    c.disabled = true;
    c.value = "";

    pintarCasilleroPorNumero(c);

    casilleros.appendChild(c);
  }
}

function renderCasilleros(data){

  casilleros.innerHTML = "";

  if(data.historialLen < 17){

    casilleros.style.gridTemplateColumns =
      "repeat(4,70px)";

    data.ultimos16.forEach(v => {

      const c = document.createElement("input");

      c.disabled = true;
      c.value = v;

      pintarCasilleroPorNumero(c);

      casilleros.appendChild(c);
    });

    if(data.historialLen === 0){
      renderInicial();
    }

  }else{

    casilleros.style.gridTemplateColumns =
      "repeat(5,70px)";

    data.ultimos5.forEach(v => {

      const c = document.createElement("input");

      c.disabled = true;
      c.value = v;

      pintarCasilleroPorNumero(c);

      casilleros.appendChild(c);
    });
  }
}

function renderEstado(data){

  renderCasilleros(data);

  renderLista(
    "favoritosBox",
    data.favoritos
  );

  renderLista(
    "onfireBox",
    data.onfire
  );

  setTotal(data.totalGeneral);

  aplicarValorFichaUI(data);

  setFicha(data);

  renderAcierto(false, 0);
  }
  async function cargarEstado(){

  try{

    const r = await fetchWithTimeout(`${API}/api/state`,{

      method:"GET",

      headers:{
        "Authorization": `Bearer ${TOKEN}`
      }

    }, 12000);

    const data = await r.json();

    if(!r.ok){
      salir();
      return;
    }

    renderEstado(data);

  }catch(e){}
}

async function guardarValorFicha(){

  if(!TOKEN){
    alert("Tenés que estar logueado.");
    return;
  }

  const valor = parseInt(valorFichaInput.value, 10);

  if(!Number.isInteger(valor) || valor <= 0){
    alert("Ingresá un valor de ficha válido.");
    return;
  }

  try{

    const r = await fetchWithTimeout(`${API}/api/valor-ficha`,{

      method:"POST",

      headers:{
        "Content-Type":"application/json",
        "Authorization": `Bearer ${TOKEN}`
      },

      body: JSON.stringify({
        valorFicha: valor
      })

    }, 12000);

    const data = await r.json();

    if(!r.ok){
      alert("No se pudo guardar el valor de ficha.");
      return;
    }

    renderValorFicha(data.valorFicha, data.valorFichaLocked);

  }catch(e){

    alert("No conecta con el backend.");
  }
}

async function resetear(){

  if(!TOKEN){
    alert("Tenés que estar logueado.");
    return;
  }

  if(!confirm("¿Seguro querés reiniciar tu historial?")) return;

  try{

    const r = await fetchWithTimeout(`${API}/api/reset`,{

      method:"POST",

      headers:{
        "Authorization": `Bearer ${TOKEN}`
      }

    }, 12000);

    if(!r.ok){
      alert("No se pudo reiniciar.");
      return;
    }

    setTotal(0);
    setFicha(1);
    setGanancia(0);

    renderLista("favoritosBox", []);
    renderLista("onfireBox", []);

    renderAcierto(false, 0);

    const fx = document.getElementById("winFx");

    if(fx){
      fx.style.display = "none";
    }

    await cargarEstado();

  }catch(e){

    if(e && e.name === "AbortError"){
      alert("El servidor tardó demasiado y se cortó la petición.");
    }else{
      alert("No conecta con el backend.");
    }
  }
  }
  nuevo.addEventListener("keydown", async (e) => {

  if(e.key !== "Enter") return;

  if(!TOKEN){
    alert("Primero tenés que ingresar con usuario y clave.");
    return;
  }

  const n = parseInt(nuevo.value, 10);

  const v = validarNumero(n);

  if(!v.ok){
    alert(v.msg);
    return;
  }

  nuevo.value = "";

  try{

    const r = await fetchWithTimeout(`${API}/api/enter`,{

      method:"POST",

      headers:{
        "Content-Type":"application/json",
        "Authorization": `Bearer ${TOKEN}`
      },

      body: JSON.stringify({ n })

    }, 12000);

    const data = await r.json();

    if(!r.ok){
      salir();
      return;
    }

    renderEstado(data);

    const show = !!data.aciertoShow;
    const val  = Number(data.aciertoValue);

    renderAcierto(show, val);

    if(show){
      sumarGanancia(val);
      showWinFx(1200);
    }

  }catch(err){

    if(err && err.name === "AbortError"){
      alert("El servidor tardó demasiado y se cortó la petición.");
    }else{
      alert("No conecta con el backend. ¿Está prendido?");
    }
  }
});

async function boot(){

  if(booted) return;

  booted = true;

  if(TOKEN){

    mostrarSistema();

    await cargarEstado();

  }else{

    mostrarLogin();
  }
}

(async function init(){

  const splash = document.getElementById("splash");
  const app = document.getElementById("appContent");

  setTimeout(() => {

    if(splash){
      splash.style.display = "none";
    }

    if(app){
      app.style.display = "block";
    }

  }, 4000);

  await boot();

})();
</script>
